<!DOCTYPE html>
<html>

<head>
    <title>Analysis Result</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        .box {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        a {
            text-decoration: none;
            color: blue;
        }
    </style>

</head>

<body>


    <h1>Analysis for {{role}} role</h1>

    <div class="box">
        <h2>Skills Found:</h2>
        <ul>
            {% for skill in skills %}
            <li>{{ skill }}</li>
            {% endfor %}
        </ul>
    </div>


    <div class="box">
        <h2>Suggestions:</h2>
        <ul>
            {% for s in suggestions %}
            <li>{{ s }}</li>
            {% endfor %}
        </ul>
    </div>


    <br>

    <div class="box">
        <h2>Resume Score:</h2>
        <h1>{{ score }}/100</h1>

        <div style="background:#ddd; border-radius:10px;">
            <div style="width: {{ score }}%; background: green; color:white; padding:5px; border-radius:10px;">
                {{ score }}%
            </div>
        </div>
    </div>


    <div class="box">
        <h2>Role Match:</h2>
        <h1>{{ match_score }}%</h1>
    </div>



    <a href="/">Go Back</a>


</body>

</html>
