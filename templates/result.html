<!DOCTYPE html>
<html>
    <head>
        <title>Analysis Result</title>

        <style>
            body{
                font-family: Arial;
                margin: 40px;
                background-color: #f5f5f5;
            }

            h1{
                color: #333;
            }

            .box{
                background: white;
                padding: 20px;
                margin-bottom: 20px;
                border-radius: 10px;
                box-shadow: 0px 0px 10px gray;
            }

            a{
                text-decoration: none;
                color: blue;
            }
        </style>

    </head>
    <body>
        

        <h1>Resume Analysis Result</h1>

        <div class="box">
        <h2>Skills Found:</h2>
        <ul>
            {% for skill in skills %}
                <li>{{ skill }}</li>
            {% endfor %}
        </ul>
        </div>


        <div class="box">
        <h2>Suggestions:</h2>
        <ul>
            {% for s in suggestions %}
                <li>{{ s }}</li>
            {% endfor %}
        </ul>
        </div>

        <br>
        <a href="/">Go Back</a>
        

    </body>
</html>
